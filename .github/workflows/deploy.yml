name: Deploy Unified Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t common-backend:latest .

      - name: Stop old container
        run: docker rm -f common-backend || true

      - name: Run migrations
        run: |
          APP_DATABASE_URL='${{ secrets.APP_DATABASE_URL }}'
          docker run --rm -w /app --add-host host.docker.internal:host-gateway \
            -e APP_DATABASE_URL="$APP_DATABASE_URL" \
            common-backend:latest alembic upgrade head

      - name: Run new container
        run: |
          APP_DATABASE_URL='${{ secrets.APP_DATABASE_URL }}'
          APP_ALLOWED_ORIGINS='${{ secrets.APP_ALLOWED_ORIGINS }}'
          APP_MEDIA_ROOT='${{ secrets.APP_MEDIA_ROOT }}'
          APP_PUBLIC_BASE_URL='${{ secrets.APP_PUBLIC_BASE_URL }}'
          APP_AUTH_SECRET_KEY='${{ secrets.APP_AUTH_SECRET_KEY }}'
          APP_GOOGLE_CLIENT_ID='${{ secrets.APP_GOOGLE_CLIENT_ID }}'
          APP_GOOGLE_CLIENT_SECRET='${{ secrets.APP_GOOGLE_CLIENT_SECRET }}'
          APP_AUTH_COOKIE_DOMAIN='${{ secrets.APP_AUTH_COOKIE_DOMAIN }}'
          TZ='Asia/Kolkata'
          : "${APP_MEDIA_ROOT:=/srv/common-backend/media}"
          : "${APP_PUBLIC_BASE_URL:=https://common-backend.ayux.in}"
          : "${APP_AUTH_COOKIE_DOMAIN:=.ayux.in}"
          docker run -d --restart unless-stopped --add-host host.docker.internal:host-gateway \
            --name common-backend \
            -p 8007:8007 \
            -e APP_DATABASE_URL="$APP_DATABASE_URL" \
            -e APP_ALLOWED_ORIGINS="$APP_ALLOWED_ORIGINS" \
            -e APP_MEDIA_ROOT="$APP_MEDIA_ROOT" \
            -e APP_PUBLIC_BASE_URL="$APP_PUBLIC_BASE_URL" \
            -e APP_AUTH_SECRET_KEY="$APP_AUTH_SECRET_KEY" \
            -e APP_GOOGLE_CLIENT_ID="$APP_GOOGLE_CLIENT_ID" \
            -e APP_GOOGLE_CLIENT_SECRET="$APP_GOOGLE_CLIENT_SECRET" \
            -e APP_AUTH_COOKIE_DOMAIN="$APP_AUTH_COOKIE_DOMAIN" \
            -e TZ="$TZ" \
            -v "$APP_MEDIA_ROOT":"$APP_MEDIA_ROOT" \
            common-backend:latest
